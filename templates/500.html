{% extends 'base.html' %}

{% block title %}500 - Internal Server Error{% endblock %}

{% block content %}
<div class="error-container fade-in">
    <div class="glass-card error-card text-center">
        <h1 class="gradient-text" style="font-size: 5rem; margin-bottom: 0;">500</h1>
        <h2>Internal Server Error</h2>
        <p>Something went wrong on our end. Please try again later.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary btn-glow mt-4">Go Home</a>
    </div>
</div>
{% endblock %}
