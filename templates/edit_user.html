{% extends 'base.html' %}

{% block title %}Edit User - Admin{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}

{% block content %}
<div class="admin-container fade-in">
    <div class="glass-card edit-user-card slide-up-anim">
        <div class="card-header">
            <h2><i class="fa-solid fa-user-pen"></i> Edit User: {{ user.username }}</h2>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline btn-sm"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
        </div>
        
        <form action="{{ url_for('admin_edit', id=user.id) }}" method="POST" class="auth-form mt-4">
            <div class="form-row">
                <div class="form-group half-width">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="glass-input" value="{{ user.username }}" required>
                </div>
                <div class="form-group half-width">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="glass-input" value="{{ user.email }}" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group half-width">
                    <label for="contact">Phone Number</label>
                    <input type="text" id="contact" name="contact" class="glass-input" value="{{ user.contact or '' }}">
                </div>
                <div class="form-group half-width">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" class="glass-input" value="{{ user.address or '' }}">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group half-width">
                    <label for="role">Role</label>
                    <select id="role" name="role" class="glass-input" required>
                        <option value="user" {% if user.role == 'user' %}selected{% endif %}>User</option>
                        <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                    </select>
                </div>
                <div class="form-group half-width">
                    <label for="password">Reset Password (leave blank to keep current)</label>
                    <input type="password" id="password" name="password" class="glass-input" placeholder="New password">
                </div>
            </div>

            <div class="form-actions mt-4">
                <button type="submit" class="btn btn-primary btn-glow">Update User</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
