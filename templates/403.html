{% extends 'base.html' %}

{% block title %}403 - Forbidden{% endblock %}

{% block content %}
<div class="error-container fade-in">
    <div class="glass-card error-card text-center">
        <h1 class="gradient-text" style="font-size: 5rem; margin-bottom: 0;">403</h1>
        <h2>Access Forbidden</h2>
        <p>You don't have permission to access this resource.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary btn-glow mt-4">Go Home</a>
    </div>
</div>
{% endblock %}
