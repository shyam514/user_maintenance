{% extends 'base.html' %}

{% block title %}Edit Profile - Portfolio App{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
{% endblock %}

{% block content %}
<div class="dashboard-container">
    <div class="glass-card slide-up-anim profile-edit-card">
        <div class="card-header">
            <h2><i class="fa-solid fa-user-pen"></i> Edit Profile</h2>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline btn-sm"><i class="fa-solid fa-arrow-left"></i> Back</a>
        </div>
        
        <form action="{{ url_for('profile_update') }}" method="POST" class="auth-form mt-4">
            <div class="form-row">
                <div class="form-group half-width">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="glass-input" value="{{ user.username }}" required>
                </div>
                <div class="form-group half-width">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="glass-input" value="{{ user.email }}" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group half-width">
                    <label for="contact">Phone Number</label>
                    <input type="tel" id="contact" name="contact" class="glass-input" value="{{ user.contact or '' }}">
                </div>
                <div class="form-group half-width">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" class="glass-input" value="{{ user.address or '' }}">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-glow mt-2">Update Profile</button>
        </form>
    </div>
</div>
{% endblock %}
